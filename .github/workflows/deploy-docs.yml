name: Deploy docs site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "manual-terraform-basics-training-course/**"
      - "docs-site/**"
      - ".github/workflows/deploy-docs.yml"
      - ".github/scripts/sync_manual_to_docs_site.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Sync manual content into the Starlight collection
        run: python3 .github/scripts/sync_manual_to_docs_site.py

      - name: Install, build, and upload the site
        uses: withastro/action@v6
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
